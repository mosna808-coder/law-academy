<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Փաստաբանական Ակադեմիա — Քննության Շտեմարան 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Armenian:wght@400;600;700&family=Noto+Sans+Armenian:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1826;
    --surface2: #232136;
    --border: #2e2b45;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e3f5;
    --muted: #8b85a8;
    --correct: #22c55e;
    --correct-bg: rgba(34,197,94,0.12);
    --correct-border: rgba(34,197,94,0.4);
    --wrong: #ef4444;
    --wrong-bg: rgba(239,68,68,0.12);
    --wrong-border: rgba(239,68,68,0.4);
    --gold: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans Armenian', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    opacity: var(--o, 0.3);
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--o, 0.3); }
    50% { opacity: calc(var(--o, 0.3) * 0.2); }
  }

  .app {
    position: relative; z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), #9333ea);
    color: white;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .header h1 {
    font-family: 'Noto Serif Armenian', serif;
    font-size: clamp(18px, 4vw, 26px);
    font-weight: 700;
    background: linear-gradient(135deg, #e8e3f5, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .header-sub {
    color: var(--muted);
    font-size: 13px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    align-items: center;
  }
  .section-select {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: border-color .2s;
  }
  .section-select:focus { border-color: var(--accent); }

  .mode-btns {
    display: flex;
    gap: 8px;
  }
  .mode-btn {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .mode-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .shuffle-btn {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .shuffle-btn:hover { border-color: var(--accent); color: var(--accent2); }

  /* PROGRESS */
  .progress-bar-wrap {
    margin-bottom: 20px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width .4s ease;
  }

  /* STATS ROW */
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-num.green { color: var(--correct); }
  .stat-num.red { color: var(--wrong); }
  .stat-num.gold { color: var(--gold); }
  .stat-label { font-size: 11px; color: var(--muted); }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
    animation: slideIn .3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-section {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent2);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .q-text {
    font-family: 'Noto Serif Armenian', serif;
    font-size: clamp(14px, 2.5vw, 17px);
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 24px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all .18s ease;
    text-align: left;
    font-family: inherit;
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    width: 100%;
  }
  .option:not(.answered):hover {
    border-color: var(--accent);
    background: rgba(124, 106, 247, 0.08);
    transform: translateX(3px);
  }
  .option-letter {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    transition: all .18s;
  }
  .option:not(.answered):hover .option-letter {
    border-color: var(--accent);
    color: var(--accent2);
    background: rgba(124,106,247,0.15);
  }

  .option.correct {
    border-color: var(--correct-border);
    background: var(--correct-bg);
    animation: correctPop .4s ease;
  }
  .option.correct .option-letter {
    background: var(--correct);
    border-color: var(--correct);
    color: white;
  }
  @keyframes correctPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  .option.wrong {
    border-color: var(--wrong-border);
    background: var(--wrong-bg);
    animation: shake .4s ease;
  }
  .option.wrong .option-letter {
    background: var(--wrong);
    border-color: var(--wrong);
    color: white;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .option.reveal-correct {
    border-color: var(--correct-border);
    background: var(--correct-bg);
  }
  .option.reveal-correct .option-letter {
    background: var(--correct);
    border-color: var(--correct);
    color: white;
  }

  /* FEEDBACK */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    display: none;
    align-items: center;
    gap: 10px;
  }
  .feedback.show { display: flex; animation: fadeIn .3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  .feedback.correct-fb {
    background: var(--correct-bg);
    border: 1px solid var(--correct-border);
    color: var(--correct);
  }
  .feedback.wrong-fb {
    background: var(--wrong-bg);
    border: 1px solid var(--wrong-border);
    color: var(--wrong);
  }
  .feedback-icon { font-size: 20px; flex-shrink: 0; }

  /* NAV */
  .nav {
    display: flex;
    gap: 10px;
    justify-content: space-between;
    margin-top: 8px;
  }
  .nav-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
    font-weight: 500;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .nav-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .nav-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* SUMMARY */
  .summary {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }
  .summary.show { display: block; animation: slideIn .4s ease; }
  .summary-emoji { font-size: 64px; margin-bottom: 16px; }
  .summary h2 {
    font-family: 'Noto Serif Armenian', serif;
    font-size: 24px;
    margin-bottom: 8px;
    color: var(--accent2);
  }
  .summary-score {
    font-size: 48px;
    font-weight: 700;
    color: var(--gold);
    margin: 16px 0;
  }
  .summary-detail { color: var(--muted); font-size: 14px; margin-bottom: 32px; line-height: 1.8; }
  .restart-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px 40px;
    font-size: 15px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .restart-btn:hover { background: var(--accent2); transform: translateY(-2px); }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

    <div class="header-sub">Գրավոր քննության շտեմարան — 2483 հարց, 8 խումբ</div>
  </div>

  <div id="loading" class="loading">

  <div id="quizUI" style="display:none">
    <div class="controls">
      <select class="section-select" id="sectionSelect" onchange="changeSection()">
        <option value="all">Բոլոր բաժինները (2529)</option>
      </select>
      <div class="mode-btns">
        <button class="mode-btn active" id="modeAll" onclick="setMode('all')">Բոլոր</button>
        <button class="mode-btn" id="modeWrong" onclick="setMode('wrong')">Սխալ</button>
        <button class="mode-btn" id="modeExam" onclick="setMode('exam')">📝 Փորձնական քննություն</button>
      </div>
      <button class="shuffle-btn" id="btnShuffle" onclick="shuffleQuestions()">🔀 Խառնել</button>
      <button class="shuffle-btn" onclick="if(confirm('Վերականգնե՞լ ամբողջ առաջընթացը:')){clearProgress();restart()}" title="Ջնջել պահված առաջընթացը">🗑 Զրոյացնել</button>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span id="progressText">1 / 1</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:10px">
        <input id="jumpInput" type="number" min="1" placeholder="Անցնել հարց №..."
          onkeydown="if(event.key==='Enter'){jumpToQ();}"
          style="flex:1;background:var(--surface2);color:var(--text);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"/>
        <button onclick="jumpToQ()"
          style="background:var(--accent);color:white;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;white-space:nowrap">Անցնել →</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num gold" id="statTotal">0</div>
        <div class="stat-label">Ընդամենը</div>
      </div>
      <div class="stat">
        <div class="stat-num green" id="statCorrect">0</div>
        <div class="stat-label">Ճիշտ ✓</div>
      </div>
      <div class="stat">
        <div class="stat-num red" id="statWrong">0</div>
        <div class="stat-label">Սխալ ✗</div>
      </div>
    </div>

    <div class="question-card" id="questionCard">
      <div class="q-section" id="qSection"></div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <span class="feedback-icon" id="feedbackIcon"></span>
        <span id="feedbackText"></span>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn" id="btnPrev" onclick="prevQ()">← Նախ.</button>
      <button class="nav-btn primary" id="btnNext" onclick="nextQ()">Հաջ. →</button>
    </div>

    <div class="summary" id="summary">
      <div class="summary-emoji" id="summaryEmoji">🎓</div>
      <h2>Շտեմարանն ավարտված է</h2>
      <div class="summary-score" id="summaryScore"></div>
      <div class="summary-detail" id="summaryDetail"></div>
      <button class="restart-btn" onclick="restart()">Նորից սկսել</button>
    </div>
  </div>
</div>

// decompress pako-style using DecompressionStream
async function decompressB64(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();
  const chunks = [];
  const reader = ds.readable.getReader();
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const total = chunks.reduce((a, c) => a + c.length, 0);
  const out = new Uint8Array(total);
  let pos = 0;
  for (const c of chunks) { out.set(c, pos); pos += c.length; }
  return new TextDecoder().decode(out);
}

// ── State ──
let ALL_Q = [];
let currentSet = [];
let currentIdx = 0;
let answered = {}; // idx -> {chosen, correct}
let wrongSet = new Set();
let currentSection = 'all';
let currentMode = 'all';
let stats = {correct: 0, wrong: 0, total: 0};

const SAVE_KEY = 'quiz_progress_2026';

function saveProgress() {
  try {
    const data = {
      currentIdx,
      answered,
      wrongSet: [...wrongSet], // array of question texts
      currentSection,
      currentMode,
      stats,
      currentSetOrder: currentSet.map(q => q.question)
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function clearProgress() {
  localStorage.removeItem(SAVE_KEY);
}

  { section: 'Խումբ 2: «ՄԱԻՀ» Եվրոպական կոնվենցիա',            count: 5  },
  { section: 'Խումբ 7: ՀՀ Վարչական իրավունք',                  count: 10 },

  { section: 'Խումբ 5: ՀՀ Քրեական իրավունք',                   count: 10 },
  { section: 'Խումբ 6: ՀՀ Քրեական դատավարություն',             count: 15 },
];

function pickRandom(arr, n) {
  const copy = arr.slice();
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy.slice(0, n);
}

function buildExamSet() {
  let pool = [];
  EXAM_DISTRIBUTION.forEach(({section, count}) => {
    const secQs = ALL_Q.filter(q => q.section === section);
    pool = pool.concat(pickRandom(secQs, Math.min(count, secQs.length)));
  });
  // Կարգը պահպանվում է ֆիքսված. սկզբում 50 Քաղաքացիական, հետո 45 Քաղաքացիական դատավարություն և այլն
  currentSet = pool.map((q, i) => ({...q, origIdx: i}));
}

function buildStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--o:${0.1+Math.random()*0.4};animation-delay:${Math.random()*4}s`;
    c.appendChild(s);
  }
}

async function init() {
  buildStars();
  try {
    const json = await decompressB64(B64);
    const raw = JSON.parse(json);
    ALL_Q = raw.map(r => ({section: r[0], question: r[1], options: r[2], correct: r[3]}));
    buildSectionSelect();

    const saved = loadProgress();
    if (saved) {
      currentSection = saved.currentSection || 'all';
      currentMode = saved.currentMode || 'all';
      wrongSet = new Set(saved.wrongSet || []);
      stats = saved.stats || {correct: 0, wrong: 0, total: 0};

      // Restore section select UI
      document.getElementById('sectionSelect').value = currentSection;
      document.getElementById('modeAll').classList.toggle('active', currentMode === 'all');
      document.getElementById('modeWrong').classList.toggle('active', currentMode === 'wrong');
      document.getElementById('modeExam').classList.toggle('active', currentMode === 'exam');
      document.getElementById('sectionSelect').disabled = (currentMode === 'exam');
      document.getElementById('btnShuffle').disabled = (currentMode === 'exam');

      if (currentMode === 'exam' && saved.currentSetOrder && saved.currentSetOrder.length) {
        // Վերականգնում ենք հենց նույն 150 հարցերի հավաքածուն նույն հերթականությամբ
        const qByText = {};
        ALL_Q.forEach(q => { qByText[q.question] = q; });
        currentSet = saved.currentSetOrder
          .map((qtext, i) => qByText[qtext] ? {...qByText[qtext], origIdx: i} : null)
          .filter(Boolean);
        if (currentSet.length === 0) buildExamSet();
      } else if (currentMode === 'exam') {
        buildExamSet();
      } else {
        // Rebuild set in same order
        let pool = currentSection === 'all' ? ALL_Q : ALL_Q.filter(q => q.section === currentSection);
        if (currentMode === 'wrong') pool = pool.filter(q => wrongSet.has(q.question));
        currentSet = pool.map((q, i) => ({...q, origIdx: i}));

        // Reorder to match saved order if possible
        if (saved.currentSetOrder && saved.currentSetOrder.length === currentSet.length) {
          const orderMap = {};
          saved.currentSetOrder.forEach((qtext, i) => orderMap[qtext] = i);
          currentSet.sort((a, b) => (orderMap[a.question] ?? 9999) - (orderMap[b.question] ?? 9999));
        }
      }

      answered = saved.answered || {};
      currentIdx = saved.currentIdx || 0;
      if (currentIdx >= currentSet.length) currentIdx = 0;

      updateStats();
      renderQuestion();

      // Show resume toast
      showToast(`↩️ Շարունակում եք հարց ${currentIdx + 1}-ից`);
    } else {
      loadSet();
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('quizUI').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div style="color:#ef4444">Սխալ բեռնման ժամանակ: '+e.message+'</div>';
  }
}

function buildSectionSelect() {
  const sel = document.getElementById('sectionSelect');
  const sections = {};
  ALL_Q.forEach(q => { sections[q.section] = (sections[q.section]||0)+1; });
  Object.entries(sections).forEach(([s,c]) => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s + ' (' + c + ')';
    sel.appendChild(o);
  });
}

function changeSection() {
  currentSection = document.getElementById('sectionSelect').value;
  restart();
}

function setMode(m) {
  currentMode = m;
  document.getElementById('modeAll').classList.toggle('active', m==='all');
  document.getElementById('modeWrong').classList.toggle('active', m==='wrong');
  document.getElementById('modeExam').classList.toggle('active', m==='exam');
  document.getElementById('sectionSelect').disabled = (m === 'exam');
  document.getElementById('btnShuffle').disabled = (m === 'exam');
  if (m === 'exam') document.getElementById('sectionSelect').value = 'all';
  restart();
}

function loadSet() {
  if (currentMode === 'exam') {
    buildExamSet();
    currentIdx = 0;
    answered = {};
    stats = {correct: 0, wrong: 0, total: 0};
    updateStats();
    renderQuestion();
    return;
  }
  let pool = currentSection === 'all' ? ALL_Q : ALL_Q.filter(q => q.section === currentSection);
  if (currentMode === 'wrong') {
    pool = pool.filter(q => wrongSet.has(q.question));
    if (pool.length === 0) {
      alert('Սխալ պատասխաններ չկան!');
      setMode('all'); return;
    }
  }
  currentSet = pool.map((q, i) => ({...q, origIdx: i}));
  currentIdx = 0;
  answered = {};
  stats = {correct: 0, wrong: 0, total: 0};
  updateStats();
  renderQuestion();
}

function shuffleQuestions() {
  for (let i = currentSet.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentSet[i], currentSet[j]] = [currentSet[j], currentSet[i]];
  }
  currentIdx = 0;
  answered = {};
  stats = {correct: 0, wrong: 0, total: 0};
  updateStats();
  renderQuestion();
}

function renderQuestion() {
  const q = currentSet[currentIdx];
  if (!q) { showSummary(); return; }

  document.getElementById('qSection').textContent = q.section;
  document.getElementById('qText').textContent = q.question;

  const container = document.getElementById('options');
  container.innerHTML = '';

  const ans = answered[currentIdx];

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    if (ans !== undefined) {
      btn.classList.add('answered');
      if (i === q.correct) btn.classList.add(ans.chosen === i ? 'correct' : 'reveal-correct');
      if (i === ans.chosen && ans.chosen !== q.correct) btn.classList.add('wrong');
    }
    btn.innerHTML = `<span class="option-letter">${LETTERS[i]}</span><span>${opt}</span>`;
    if (ans === undefined) btn.onclick = () => answer(i);
    container.appendChild(btn);
  });

  // feedback
  const fb = document.getElementById('feedback');
  const fbText = document.getElementById('feedbackText');
  const fbIcon = document.getElementById('feedbackIcon');
  if (ans !== undefined) {
    fb.classList.add('show');
    if (ans.chosen === q.correct) {
      fb.className = 'feedback show correct-fb';
      fbIcon.textContent = '✅';
      fbText.textContent = 'Ճի՛շտ պատասխան։';
    } else {
      fb.className = 'feedback show wrong-fb';
      fbIcon.textContent = '❌';
      fbText.textContent = 'Սխա՛լ պատասխան։ Ճիշտ պատասխանը նշված է կանաչով:';
    }
  } else {
    fb.className = 'feedback';
  }

  updateProgress();
  updateNav();
}

function answer(chosen) {
  const q = currentSet[currentIdx];
  const correct = chosen === q.correct;
  answered[currentIdx] = {chosen, correct};
  
  if (correct) {
    stats.correct++;
    // If they now got it right, remove from wrongSet so it disappears from Սխալ mode next time
    wrongSet.delete(q.question);
  } else {
    stats.wrong++;
    wrongSet.add(q.question); // use question text as stable key
  }
  stats.total++;
  updateStats();
  
  saveProgress();
  renderQuestion();
}

function nextQ() {
  if (currentIdx < currentSet.length - 1) {
    currentIdx++;
    saveProgress();
    renderQuestion();
  } else {
    showSummary();
  }
}

function prevQ() {
  if (currentIdx > 0) {
    currentIdx--;
    saveProgress();
    renderQuestion();
  }
}

function updateProgress() {
  const total = currentSet.length;
  const pct = total > 0 ? Math.round((currentIdx + 1) / total * 100) : 0;
  document.getElementById('progressText').textContent = `${currentIdx+1} / ${total} ✎`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function toggleJumpBox() {
  const box = document.getElementById('jumpBox');
  const visible = box.style.display === 'block';
  box.style.display = visible ? 'none' : 'block';
  if (!visible) {
    const inp = document.getElementById('jumpInput');
    inp.max = currentSet.length;
    inp.value = currentIdx + 1;
    inp.focus();
    inp.select();
  }
}

function jumpToQ() {
  const inp = document.getElementById('jumpInput');
  const val = parseInt(inp.value);
  if (isNaN(val) || val < 1 || val > currentSet.length) {
    showToast(`⚠️ Մուտքագրեք 1–${currentSet.length} թիվ`);
    inp.focus();
    return;
  }
  currentIdx = val - 1;
  inp.value = '';
  inp.blur();
  saveProgress();
  renderQuestion();
}

function updateStats() {
  document.getElementById('statTotal').textContent = stats.total;
  document.getElementById('statCorrect').textContent = stats.correct;
  document.getElementById('statWrong').textContent = stats.wrong;
}

function updateNav() {
  document.getElementById('btnPrev').disabled = currentIdx === 0;
  const isLast = currentIdx === currentSet.length - 1;
  document.getElementById('btnNext').textContent = isLast ? 'Ավարտ ✓' : 'Հաջ. →';
}

function showSummary() {
  const total = stats.total;
  const correct = stats.correct;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  
  let emoji = '😔';
  if (pct >= 90) emoji = '🏆';
  else if (pct >= 75) emoji = '🎓';
  else if (pct >= 60) emoji = '📚';
  else if (pct >= 40) emoji = '💪';

  document.getElementById('summaryEmoji').textContent = emoji;
  document.getElementById('summaryScore').textContent = pct + '%';
  document.getElementById('summaryDetail').innerHTML = 
    `Ճիշտ: <b style="color:var(--correct)">${correct}</b> / ${total}<br>
     Սխալ: <b style="color:var(--wrong)">${stats.wrong}</b> / ${total}<br>
     Անպատասխան: <b>${currentSet.length - total}</b>`;

  document.getElementById('summary').classList.add('show');
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('nav') && (document.getElementById('nav').style.display = 'none');
}

function restart() {
  clearProgress();
  document.getElementById('summary').classList.remove('show');
  document.getElementById('questionCard').style.display = 'block';
  loadSet();
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#232136;border:1px solid #7c6af7;color:#e8e3f5;padding:12px 24px;border-radius:12px;font-size:14px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.4);transition:opacity .4s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

init();
</script>

if ('serviceWorker' in navigator) {
 window.addEventListener('load', ()=> {
   navigator.serviceWorker.register('./sw.js').catch(console.error);
 });
}
</script>
